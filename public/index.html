<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="description" content="这是一个定时更新的 proxy list（代理列表），包含 HTTPS|SOCKS4|SOCKS5 节点。（HTTPS、SOCKS5全都支持SSL，SOCKS4不确定）">
<meta name="author" content="CB-X2-Jun">
<title>Proxy List</title>

<link rel="stylesheet" href="https://lipis.github.io/flag-icons/css/flag-icons.min.css"/>

<style>
:root {
  --blue: #4aa3df;
  --blue-light: #eaf6fd;
  --border: #d8e6f3;
  --text: #333;
  --bg: #f5f9fc;
  --card: #ffffff;
  --hover: #f8fbfe;
}
body.dark {
  --blue: #5bb3ff;
  --blue-light: #1e2a36;
  --border: #2b3a48;
  --text: #e6edf3;
  --bg: #0f1720;
  --card: #141e28;
  --hover: #1b2733;
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 24px;
}
h2 { margin: 0 0 16px; color: #2c6fa3; }

.theme-toggle {
  position: fixed;
  top: 16px;
  right: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
}
.theme-toggle input {
  width: 42px;
  height: 22px;
  appearance: none;
  background: #ccc;
  border-radius: 999px;
  position: relative;
}
.theme-toggle input::before {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  top: 2px;
  left: 2px;
  background: white;
  border-radius: 50%;
  transition: .2s;
}
.theme-toggle input:checked { background: var(--blue); }
.theme-toggle input:checked::before { transform: translateX(20px); }

.filter {
  background: var(--card);
  padding: 12px 16px;
  border-radius: 10px;
  box-shadow: 0 4px 12px rgba(0,0,0,.04);
  margin-bottom: 16px;
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}
.select-box { display: flex; align-items: center; gap: 8px; }
select {
  padding: 6px 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
}
.tags { display: inline-flex; flex-wrap: wrap; gap: 6px; }
.tag {
  background: var(--blue-light);
  border-radius: 14px;
  padding: 4px 10px;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--card);
  border-radius: 10px;
  overflow: hidden;
}
th, td {
  padding: 10px 8px;
  border-bottom: 1px solid var(--border);
}
th { background: var(--blue-light); color: #2c6fa3; }
tr:hover td { background: var(--hover); }

.country { display: inline-flex; align-items: center; gap: 6px; }
button {
  background: var(--blue);
  color: white;
  border: none;
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
}

.bar-wrap {
  margin-top: 4px;
  width: 100%;
  height: 6px;
  background: var(--border);
  border-radius: 999px;
}
.bar { height: 100%; }
.bar.green { background: #3cb371; }
.bar.yellow { background: #f0c24b; }
.bar.red { background: #e5533d; }
</style>
</head>

<body>

<label class="theme-toggle">
  ☀️ <input type="checkbox" id="themeToggle"> 🌙
</label>

<h2>🌐 代理列表</h2>

<!-- ✅ 已删除「数据库中代理数」 -->
<div id="stats" style="margin:8px 0 16px;font-size:14px;">
  目前可用：—｜
  HTTPS：—｜
  SOCKS4：—｜
  SOCKS5：—｜
  可用国家数：—
</div>

<div class="filter">
  <div class="select-box">
    国家：
    <select id="countrySelect"><option value="">选择国家</option></select>
    <div id="countryTags" class="tags"></div>
  </div>
  <div class="select-box">
    协议：
    <select id="protocolSelect">
      <option value="">选择协议</option>
      <option value="https">HTTPS</option>
      <option value="socks4">SOCKS4</option>
      <option value="socks5">SOCKS5</option>
    </select>
    <div id="protocolTags" class="tags"></div>
  </div>
  <div class="select-box">
    端口：
    <select id="portSelect"><option value="">选择端口</option></select>
    <div id="portTags" class="tags"></div>
  </div>
  <div class="select-box">
    排序方式：
    <select id="sortSelect">
      <option value="default">默认</option>
      <option value="latency">延迟</option>
      <option value="success">成功率</option>
    </select>
  </div>
</div>

<table>
<thead>
<tr>
<th>IP</th><th>端口</th><th>协议</th><th>国家</th>
<th>延迟</th><th>成功率</th><th>上次检测</th><th>复制</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
const toggle = document.getElementById('themeToggle');
if (localStorage.getItem('theme') === 'dark') {
  document.body.classList.add('dark');
  toggle.checked = true;
}
toggle.onchange = () => {
  document.body.classList.toggle('dark', toggle.checked);
  localStorage.setItem('theme', toggle.checked ? 'dark' : 'light');
};

let data = [];
const selectedCountries = new Set();
const selectedProtocols = new Set();
const selectedPorts = new Set();
let sortMethod = 'default';

fetch('proxies.json').then(r => r.json()).then(d => {
  data = d.map((i, idx) => ({ ...i, __index: idx }));
  init(); render();
});

function init() {
  [...new Set(data.map(i => i.country_cn))]
    .forEach(c => countrySelect.add(new Option(c, c)));
  [...new Set(data.map(i => i.port))].sort((a,b)=>a-b)
    .forEach(p => portSelect.add(new Option(p, p)));
}

countrySelect.onchange = e => e.target.value && (selectedCountries.add(e.target.value), e.target.value='', renderTags(), render());
protocolSelect.onchange = e => e.target.value && (selectedProtocols.add(e.target.value), e.target.value='', renderTags(), render());
portSelect.onchange = e => e.target.value && (selectedPorts.add(e.target.value), e.target.value='', renderTags(), render());
sortSelect.onchange = e => (sortMethod = e.target.value, render());

function renderTags() {
  renderTagGroup('countryTags', selectedCountries, true);
  renderTagGroup('protocolTags', selectedProtocols);
  renderTagGroup('portTags', selectedPorts);
}

function renderTagGroup(id, set, flag) {
  const box = document.getElementById(id);
  box.innerHTML = '';
  [...set].forEach(v => {
    const t = document.createElement('div');
    const code = flag ? data.find(i=>i.country_cn===v)?.country : '';
    t.className = 'tag';
    t.innerHTML = `${code?`<span class="fi fi-${code.toLowerCase()}"></span>`:''}${v}<span>×</span>`;
    t.lastChild.onclick = () => (set.delete(v), renderTags(), render());
    box.appendChild(t);
  });
}

function updateStats(list) {
  document.getElementById('stats').textContent =
    `目前可用：${list.length} ｜ ` +
    `HTTPS：${list.filter(i=>i.protocol==='https').length} ｜ ` +
    `SOCKS4：${list.filter(i=>i.protocol==='socks4').length} ｜ ` +
    `SOCKS5：${list.filter(i=>i.protocol==='socks5').length} ｜ ` +
    `可用国家数：${new Set(list.map(i=>i.country)).size}`;
}

function render() {
  let list = data.filter(i =>
    (!selectedCountries.size || selectedCountries.has(i.country_cn)) &&
    (!selectedProtocols.size || selectedProtocols.has(i.protocol)) &&
    (!selectedPorts.size || selectedPorts.has(String(i.port)))
  );

  if (sortMethod === 'latency')
    list = list.slice().sort((a,b)=>a.latency-b.latency||a.__index-b.__index);
  else if (sortMethod === 'success')
    list = list.slice().sort((a,b)=>(b.success/b.total)-(a.success/a.total)||a.__index-b.__index);

  updateStats(list);

  tbody.innerHTML='';
  list.forEach(i=>{
    tbody.insertAdjacentHTML('beforeend',`
      <tr>
        <td>${i.ip}</td><td>${i.port}</td><td>${i.protocol}</td>
        <td><span class="country"><span class="fi fi-${i.country.toLowerCase()}"></span>${i.country_cn}</span></td>
        <td>${i.latency} ms</td>
        <td>${(i.success/i.total*100).toFixed(1)}%</td>
        <td>${ago(i.last_check)}</td>
        <td><button onclick="copy('${i.ip}:${i.port}')">复制</button></td>
      </tr>`);
  });
}

function ago(ts){const s=Math.floor(Date.now()/1000-ts);return s<60?`${s} 秒前`:s<3600?`${s/60|0} 分钟前`:`${s/3600|0} 小时前`;}
function copy(t){navigator.clipboard.writeText(t);}
</script>

</body>
</html>
