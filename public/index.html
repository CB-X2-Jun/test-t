<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Proxy List</title>

<link rel="stylesheet"
  href="https://lipis.github.io/flag-icons/css/flag-icons.min.css" />

<style>
/* ===== 亮色主题 ===== */
:root {
  --bg: #f5f9fc;
  --panel: #ffffff;
  --panel-hover: #f8fbfe;

  --border: #d8e6f3;

  --text-main: #1f2937;
  --text-sub: #4b5563;

  --blue: #4aa3df;
  --blue-soft: #eaf6fd;
}

/* ===== 暗色主题 ===== */
body[data-theme="dark"] {
  --bg: #0f1720;
  --panel: #141e28;
  --panel-hover: #1a2633;

  --border: #243445;

  --text-main: #e6edf3;
  --text-sub: #9fb3c8;

  --blue: #6bbcff;
  --blue-soft: #1f2f3a;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 24px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text-main);
}

/* ===== 标题 ===== */
h2 {
  margin: 0 0 16px;
  color: var(--blue);
}

/* ===== 筛选栏 ===== */
.filter {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 16px;
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}

.select-box {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-sub);
}

select {
  background: var(--panel);
  color: var(--text-main);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 8px;
}

/* ===== 标签 ===== */
.tags {
  display: inline-flex;
  gap: 6px;
  flex-wrap: wrap;
}

.tag {
  background: var(--blue-soft);
  color: var(--blue);
  border-radius: 14px;
  padding: 4px 10px;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.tag span {
  cursor: pointer;
  opacity: .6;
}
.tag span:hover { opacity: 1; }

/* ===== 表格 ===== */
table {
  width: 100%;
  border-collapse: collapse;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

th {
  background: var(--blue-soft);
  color: var(--blue);
  font-weight: 600;
  padding: 10px 8px;
}

td {
  padding: 10px 8px;
  border-bottom: 1px solid var(--border);
  color: var(--text-main);
}

tr:hover td {
  background: var(--panel-hover);
}

/* ===== 国家列 ===== */
.country {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

/* ===== 按钮 ===== */
button {
  background: var(--blue);
  color: #ffffff;
  border: none;
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 13px;
}

button:hover {
  filter: brightness(1.05);
}

/* ===== 主题切换 ===== */
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 24px;
  display: flex;
  gap: 8px;
}

.switch {
  position: relative;
  width: 42px;
  height: 22px;
}

.switch input { display: none; }

.slider {
  position: absolute;
  inset: 0;
  background: #777;
  border-radius: 999px;
  cursor: pointer;
}

.slider::before {
  content: "";
  position: absolute;
  width: 18px;
  height: 18px;
  left: 2px;
  top: 2px;
  background: white;
  border-radius: 50%;
  transition: .25s;
}

input:checked + .slider {
  background: var(--blue);
}

input:checked + .slider::before {
  transform: translateX(20px);
}
</style>
</head>

<body>

<div class="theme-toggle">
  <span>☀️</span>
  <label class="switch">
    <input type="checkbox" id="themeSwitch">
    <span class="slider"></span>
  </label>
  <span>🌙</span>
</div>

<h2>🌐 代理列表</h2>

<div class="filter">
  <div class="select-box">
    国家：
    <select id="countrySelect">
      <option value="">选择国家</option>
    </select>
    <div id="countryTags" class="tags"></div>
  </div>

  <div class="select-box">
    协议：
    <select id="protocolSelect">
      <option value="">选择协议</option>
      <option value="https">HTTPS</option>
      <option value="socks4">SOCKS4</option>
      <option value="socks5">SOCKS5</option>
    </select>
    <div id="protocolTags" class="tags"></div>
  </div>
</div>

<table>
<thead>
<tr>
<th>IP</th><th>端口</th><th>协议</th><th>国家</th>
<th>延迟</th><th>成功率</th><th>上次检测</th><th>复制</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
let data=[],selectedCountries=new Set(),selectedProtocols=new Set();
fetch('proxies.json').then(r=>r.json()).then(d=>{data=d;init();render();});

function init(){
  const cs=[...new Set(data.map(i=>i.country_cn))];
  cs.forEach(c=>countrySelect.add(new Option(c,c)));
}

countrySelect.onchange=e=>{if(e.target.value){selectedCountries.add(e.target.value);e.target.value='';renderTags();render();}};
protocolSelect.onchange=e=>{if(e.target.value){selectedProtocols.add(e.target.value);e.target.value='';renderTags();render();}};

function renderTags(){
  draw('countryTags',selectedCountries,true);
  draw('protocolTags',selectedProtocols,false);
}

function draw(id,set,flag){
  const box=document.getElementById(id);box.innerHTML='';
  [...set].forEach(v=>{
    const code=flag?data.find(i=>i.country_cn===v)?.country:'';
    box.insertAdjacentHTML('beforeend',
      `<div class="tag">${code?`<span class="fi fi-${code.toLowerCase()}"></span>`:''}${v}<span onclick="remove('${id}','${v}')">×</span></div>`
    );
  });
}

function remove(id,v){
  (id==='countryTags'?selectedCountries:selectedProtocols).delete(v);
  renderTags();render();
}

function render(){
  tbody.innerHTML='';
  data.filter(i=>
    (!selectedCountries.size||selectedCountries.has(i.country_cn)) &&
    (!selectedProtocols.size||selectedProtocols.has(i.protocol))
  ).forEach(i=>{
    tbody.insertAdjacentHTML('beforeend',`
      <tr>
        <td>${i.ip}</td>
        <td>${i.port}</td>
        <td>${i.protocol}</td>
        <td class="country"><span class="fi fi-${i.country.toLowerCase()}"></span>${i.country_cn}</td>
        <td>${i.latency} ms</td>
        <td>${i.total<3?'新节点 (检测次数小于3)':(i.success/i.total*100).toFixed(1)+'%'}</td>
        <td>${new Date(i.last_check*1000).toLocaleString()}</td>
        <td><button onclick="navigator.clipboard.writeText('${i.ip}:${i.port}')">复制</button></td>
      </tr>
    `);
  });
}

const sw=document.getElementById('themeSwitch');
if(localStorage.theme==='dark'){document.body.dataset.theme='dark';sw.checked=true;}
sw.onchange=()=>{document.body.dataset.theme=sw.checked?'dark':'light';localStorage.theme=document.body.dataset.theme;}
</script>

</body>
</html>
